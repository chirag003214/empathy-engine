<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Empathy Engine</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }

    .card {
      background: #fff;
      max-width: 680px;
      width: 100%;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10), 0 1px 4px rgba(0,0,0,0.06);
      padding: 2.5rem 2rem;
    }

    .app-title {
      font-size: 1.9rem;
      font-weight: 700;
      color: #1a1a2e;
      margin-bottom: 0.25rem;
    }

    .app-subtitle {
      font-size: 0.95rem;
      color: #64748b;
      margin-bottom: 2rem;
    }

    textarea {
      width: 100%;
      padding: 0.85rem 1rem;
      border: 1.5px solid #e2e8f0;
      border-radius: 10px;
      font-size: 1rem;
      font-family: inherit;
      resize: vertical;
      outline: none;
      transition: border-color 0.2s;
      color: #1e293b;
    }

    textarea:focus { border-color: #6366f1; }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-top: 0.85rem;
    }

    .chip {
      background: #f1f5f9;
      border: 1px solid #e2e8f0;
      border-radius: 20px;
      padding: 0.3rem 0.85rem;
      font-size: 0.78rem;
      color: #475569;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 260px;
    }

    .chip:hover { background: #e0e7ff; border-color: #6366f1; color: #4338ca; }

    .btn-analyze {
      margin-top: 1.25rem;
      width: 100%;
      padding: 0.85rem;
      background: #6366f1;
      color: #fff;
      font-size: 1.05rem;
      font-weight: 600;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: background 0.2s, opacity 0.2s;
    }

    .btn-analyze:hover:not(:disabled) { background: #4f46e5; }
    .btn-analyze:disabled { opacity: 0.65; cursor: not-allowed; }

    /* ── Results ── */
    #results {
      display: none;
      margin-top: 2rem;
      border-top: 1px solid #f1f5f9;
      padding-top: 1.75rem;
    }

    .result-row {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 1.1rem;
    }

    .result-label {
      font-size: 0.82rem;
      font-weight: 600;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      min-width: 90px;
    }

    .emotion-badge {
      display: inline-block;
      padding: 0.3rem 1rem;
      border-radius: 20px;
      font-size: 0.95rem;
      font-weight: 700;
      color: #fff;
      text-transform: capitalize;
      letter-spacing: 0.03em;
    }

    .confidence-wrap {
      flex: 1;
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .bar-bg {
      flex: 1;
      height: 10px;
      background: #e2e8f0;
      border-radius: 999px;
      overflow: hidden;
    }

    .bar-fill {
      height: 100%;
      border-radius: 999px;
      background: #6366f1;
      width: 0%;
      transition: width 0.6s cubic-bezier(0.4,0,0.2,1);
    }

    .bar-pct {
      font-size: 0.88rem;
      font-weight: 600;
      color: #475569;
      min-width: 40px;
      text-align: right;
    }

    .params-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.6rem;
      flex: 1;
    }

    .param-box {
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      padding: 0.5rem 0.85rem;
      text-align: center;
    }

    .param-box .param-key {
      font-size: 0.72rem;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .param-box .param-val {
      font-size: 1.05rem;
      font-weight: 700;
      color: #1e293b;
      margin-top: 0.15rem;
    }

    audio {
      width: 100%;
      margin-top: 0.5rem;
      border-radius: 8px;
      outline: none;
    }

    #errorMsg {
      display: none;
      margin-top: 1rem;
      padding: 0.75rem 1rem;
      background: #fef2f2;
      border: 1px solid #fecaca;
      border-radius: 8px;
      color: #dc2626;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
<div class="card">
  <div class="app-title">🎙 Empathy Engine</div>
  <div class="app-subtitle">AI-powered emotional text-to-speech</div>

  <textarea id="textInput" rows="5" placeholder="Type or paste any sentence here..."></textarea>

  <div class="chips">
    <button class="chip" data-text="I just got promoted! This is the best day of my life!">
      I just got promoted! This is the best day of my life!
    </button>
    <button class="chip" data-text="I can't believe they cancelled my order again. This is unacceptable.">
      I can't believe they cancelled my order again. This is unacceptable.
    </button>
    <button class="chip" data-text="The meeting is scheduled for 3pm tomorrow.">
      The meeting is scheduled for 3pm tomorrow.
    </button>
    <button class="chip" data-text="I'm not sure if I can handle this situation.">
      I'm not sure if I can handle this situation.
    </button>
  </div>

  <button class="btn-analyze" id="analyzeBtn">Analyze &amp; Speak</button>

  <div id="results">
    <div class="result-row">
      <span class="result-label">Emotion</span>
      <span class="emotion-badge" id="emotionBadge">—</span>
    </div>

    <div class="result-row">
      <span class="result-label">Confidence</span>
      <div class="confidence-wrap">
        <div class="bar-bg"><div class="bar-fill" id="barFill"></div></div>
        <span class="bar-pct" id="barPct">0%</span>
      </div>
    </div>

    <div class="result-row">
      <span class="result-label">Voice</span>
      <div class="params-grid">
        <div class="param-box">
          <div class="param-key">Rate</div>
          <div class="param-val" id="paramRate">—</div>
        </div>
        <div class="param-box">
          <div class="param-key">Volume</div>
          <div class="param-val" id="paramVolume">—</div>
        </div>
      </div>
    </div>

    <audio id="audioPlayer" controls></audio>
  </div>

  <div id="errorMsg"></div>
</div>

<script>
  const EMOTION_COLORS = {
    joy:      "#f59e0b",
    surprise: "#8b5cf6",
    anger:    "#ef4444",
    sadness:  "#3b82f6",
    fear:     "#6366f1",
    disgust:  "#10b981",
    neutral:  "#6b7280",
  };

  const analyzeBtn  = document.getElementById("analyzeBtn");
  const textInput   = document.getElementById("textInput");
  const results     = document.getElementById("results");
  const errorMsg    = document.getElementById("errorMsg");
  const emotionBadge = document.getElementById("emotionBadge");
  const barFill     = document.getElementById("barFill");
  const barPct      = document.getElementById("barPct");
  const paramRate   = document.getElementById("paramRate");
  const paramVolume = document.getElementById("paramVolume");
  const audioPlayer = document.getElementById("audioPlayer");

  // Example chips
  document.querySelectorAll(".chip").forEach(chip => {
    chip.addEventListener("click", () => {
      textInput.value = chip.dataset.text;
      textInput.focus();
    });
  });

  analyzeBtn.addEventListener("click", async () => {
    const text = textInput.value.trim();
    if (!text) {
      showError("Please enter some text before analyzing.");
      return;
    }

    setLoading(true);
    hideError();

    try {
      const res = await fetch("/analyze", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ text }),
      });

      const data = await res.json();

      if (!res.ok) {
        showError(data.error || "Something went wrong. Please try again.");
        return;
      }

      // Populate results
      const emotion = data.emotion;
      const color = EMOTION_COLORS[emotion] || "#6b7280";

      emotionBadge.textContent = emotion;
      emotionBadge.style.background = color;

      const pct = Math.round(data.intensity * 100);
      barFill.style.width = pct + "%";
      barFill.style.background = color;
      barPct.textContent = pct + "%";

      paramRate.textContent = data.voice_params.rate;
      paramVolume.textContent = data.voice_params.volume.toFixed(2);

      audioPlayer.src = data.audio_url;
      audioPlayer.load();
      audioPlayer.play().catch(() => {});  // autoplay may be blocked

      results.style.display = "block";

    } catch (err) {
      showError("Network error: " + err.message);
    } finally {
      setLoading(false);
    }
  });

  function setLoading(on) {
    analyzeBtn.disabled = on;
    analyzeBtn.textContent = on ? "Processing..." : "Analyze & Speak";
  }

  function showError(msg) {
    errorMsg.textContent = msg;
    errorMsg.style.display = "block";
  }

  function hideError() {
    errorMsg.style.display = "none";
    errorMsg.textContent = "";
  }
</script>
</body>
</html>
